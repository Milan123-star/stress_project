stages:
  data_ingestion:
    cmd: python src/data_ingestion.py
    deps:
    - Teen_Mental_Health_Dataset.csv
    - src/data_ingestion.py
    params:
    - data_ingestion.test_size
    outs:
    - data/raw
  feature_engineering:
    cmd: python src/feature_engineering.py
    deps:
    - data/raw/model.csv
    - src/feature_engineering.py
    params:
    - feature_engineering.encoder
    outs:
    - data/feature_engg
  model_building:
    cmd: python src/model_building.py
    deps:
    - data/feature_engg/X.csv
    - data/feature_engg/y.csv
    - src/model_building.py
    params:
    - model_building.param_grid
    outs:
    - data/model
  register_model:
    cmd: python src/register_model.py
    deps:
    - reports/experiment.json
    - src/register_model.py
  promote_model:
    cmd: python src/promote_model.py
    deps:
    - src/promote_model.py
